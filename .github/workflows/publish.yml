# Publishes pi-unified-exec to npm via Trusted Publisher (OIDC).
# No NPM_TOKEN secret required — authentication is proven by the
# id-token: write permission below, which GitHub Actions signs and npm
# validates against the Trusted Publisher config on
# https://www.npmjs.com/package/pi-unified-exec/access.
#
# Release flow:
#   npm version patch          # bumps package.json + creates v* tag
#   git push && git push --tags

name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Publish (Trusted Publisher + provenance)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      # Node 24 ships npm 11.x out of the box, which is required for
      # Trusted Publisher OIDC (introduced in npm 11.5.1, July 2025).
      # Node 22 ships npm 10.x; trying to `npm install -g npm@latest`
      # in CI breaks mid-upgrade with a promise-retry MODULE_NOT_FOUND
      # (self-upgrade corruption), so we just pick a node version that
      # ships new-enough npm.
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Print toolchain versions (diagnostic)
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx tsx --test tests/*.test.ts

      - name: Verify package.json version matches tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance
