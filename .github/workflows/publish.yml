name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Publish (Trusted Publisher + provenance)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write          # required for npm OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npx tsx --test tests/*.test.ts

      - name: Verify package.json version matches tag
        if: github.event_name == 'push'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish
        run: npm publish --provenance
        env:
          # Bootstrap-then-OIDC pattern.
          #
          # Trusted Publisher is a per-package setting on npmjs.com, so it
          # cannot be configured before the package exists. For the very
          # first publish, set an `NPM_TOKEN` repository secret to a one-time
          # npm Automation Token (npmjs.com -> Access Tokens -> Generate New
          # Token -> Automation). Automation tokens bypass 2FA and are meant
          # for CI.
          #
          # Once v0.1.0 is published:
          #   1. Configure Trusted Publisher on npmjs.com pointing at this
          #      workflow file.
          #   2. Delete the NPM_TOKEN secret from GitHub.
          #
          # With NPM_TOKEN unset, NODE_AUTH_TOKEN is empty -> npm falls back
          # to OIDC trusted publishing via the `id-token: write` permission
          # above, and provenance attestations are emitted automatically.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
