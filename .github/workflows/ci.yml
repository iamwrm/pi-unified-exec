name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # pi-coding-agent requires Node >= 22.19.0 (its bundled undici 8
        # uses worker_threads.markAsUncloneable, absent on Node 20).
        node: ["22", "24"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # Run the PTY e2e file directly (not via --test) so per-test output
      # streams live instead of being buffered until file completion — if
      # something hangs, the log shows exactly which test.
      - name: Test (PTY e2e, direct)
        run: npx tsx tests/e2e-pty.test.ts
        timeout-minutes: 5

      - name: Test
        run: npx tsx --test tests/*.test.ts
        timeout-minutes: 10
